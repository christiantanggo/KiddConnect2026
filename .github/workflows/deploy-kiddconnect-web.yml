# KiddConnect Next.js app → Vercel (monorepo root: kiddconnect-web).
#
# GitHub → repo → Settings → Secrets and variables → Actions, add:
#   VERCEL_TOKEN        — https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — Team ID (Vercel → Team Settings → General), or from .vercel/project.json after `vercel link`
#   VERCEL_PROJECT_ID   — Project → Settings → General → Project ID
#
# First-time: in kiddconnect-web run `npx vercel link` and copy org/project IDs into secrets.

name: Deploy KiddConnect Web to Vercel

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'kiddconnect-web/**'
      - '.github/workflows/deploy-kiddconnect-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: kiddconnect-web → Vercel (production)
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    defaults:
      run:
        working-directory: kiddconnect-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: kiddconnect-web/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt → production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
