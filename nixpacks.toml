# Railway builds the Node backend only. Supabase Edge Functions (Deno) are deployed by Supabase.
# Force Node provider so Nixpacks doesn't use Deno (triggered by supabase/functions/* importing deno.land).
providers = ["node"]

# Force Node 20 (avoids Node 18 deprecation warnings from Supabase/AWS SDK).
[variables]
NIXPACKS_NODE_VERSION = "20"
